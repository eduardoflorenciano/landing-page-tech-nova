<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato - TechNova</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container py-5">
        <h1 class="text-center mb-4">Entre em Contato</h1>

        <form class="mx-auto" style="max-width: 600px;">
            <div class="mb-3">
                <label for="nome" class="form-label">Nome:</label>
                <input type="text" id="nome" name="nome" class="form-control" required>
            </div>

            <div class="mb-3">
                <label for="email" class="form-label">E-mail:</label>
                <input type="email" id="email" name="email" class="form-control" required>
            </div>

            <div class="mb-3">
                <label for="telefone" class="form-label">Telefone:</label>
                <input type="tel" id="telefone" name="telefone" class="form-control" required>
            </div>

            <div class="form-check mb-4">
                <input type="checkbox" class="form-check-input" id="consentimento" required>
                <label class="form-check-label" for="consentimento">
                    Concordo que meus dados sejam coletados apenas para fins de contato.
                </label>
            </div>

            <button type="submit" class="btn btn-primary w-100">Enviar Mensagem</button>
        </form>

        <div class="text-center mt-4">
            <a href="index.html" class="btn btn-outline-secondary">Voltar à Página Inicial</a>
        </div>
    </div>

</body>

</html>
